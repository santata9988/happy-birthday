<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎂</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card-container" onclick="toggleCard()">
        <div class="card" id="birthdayCard">
            
            <div class="card-front">
                <div class="cake-emoji">🎂</div>
                <h1>Happy Birthday!</h1>
                <p class="click-hint">คลิกเพื่อเปิดการ์ดดูสิ ✨</p>
            </div>
            
            <div class="card-back">
                <div class="profile-frame">
                    <img src="E29B0159-0832-4D57-BA63-C21100DA1716_1_201_a.jpeg" alt="Birthday Person" class="profile-img">
                </div>
                <h2>สุขสันต์วันเกิด 🎉</h2>
                <p>ขอให้มีความสุขมากๆ ในทุกๆ วัน<br>
                   คิดสิ่งใดก็ขอให้สมปรารถนา<br>
                   สุขภาพร่างกายแข็งแรง ร่ำรวยเงินทอง! 💖</p>
                <H1>โอนเงินให้นำ100บาท(หนึ่งร้อยบาทถ้วน)</H1>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
